<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Dashboard</title>

<style>
.container-box{
    max-width: 800px;
    margin: auto;
}

.card{
    border-radius: 10px;
}
</style>

</head>

<body class="bg-body-tertiary">

<div class="container py-5 container-box">

  <!-- HEADER -->
  <div class="text-center mb-4">
    <h2>Minhas Atividades</h2>
    <p class="text-secondary">Organize seus estudos 📚</p>
  </div>

  <!-- BOTÃO -->
  <div class="d-flex justify-content-between mb-3">
    <a href="atividade.html" class="btn btn-success">+ Nova atividade</a>
  </div>

  <!-- LISTA -->
  <div id="listaAtividades"></div>

</div>

<script>
function formatarData(data){
    return new Date(data).toLocaleDateString('pt-BR');
}

function carregarAtividades(){
    let atividades = JSON.parse(localStorage.getItem("atividades")) || [];

    let container = document.getElementById("listaAtividades");

    container.innerHTML = "";

    if(atividades.length === 0){
        container.innerHTML = `
        <div class="text-center mt-5">
            <h5 class="text-secondary">Nenhuma atividade cadastrada 😢</h5>
        </div>
        `;
        return;
    }

    atividades.forEach(atividade => {

        let card = `
        <div class="card p-3 mb-3 shadow-sm">
            <h5>${atividade.titulo}</h5>
            <p class="text-secondary">${atividade.descricao}</p>
            <p><strong>Disciplina:</strong> ${atividade.disciplina}</p>
            <p><strong>Data:</strong> ${formatarData(atividade.data)}</p>
        </div>
        `;

        container.innerHTML += card;
    });
}

carregarAtividades();
</script>

</body>
</html>
