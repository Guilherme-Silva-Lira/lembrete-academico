<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Nova Atividade</title>

<style>

.container-box{
    max-width: 650px;
    margin: auto;
}

</style>

</head>

<body class="bg-body-tertiary d-flex align-items-center" style="min-height:100vh;">

<div class="container container-box">

    <div class="card shadow-lg p-4">

        <!-- TOPO -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3 id="tituloTela">Nova Atividade</h3>

            <a href="dashboard.html" class="btn btn-outline-light">
                ⬅ Dashboard
            </a>

        </div>

        <!-- FORM -->
        <form onsubmit="salvarAtividade(event)">

            <div class="form-floating mb-3">

                <input
                    type="text"
                    class="form-control"
                    id="titulo"
                    placeholder="Título"
                    required>

                <label for="titulo">Título</label>

            </div>

            <div class="form-floating mb-3">

                <input
                    type="text"
                    class="form-control"
                    id="disciplina"
                    placeholder="Disciplina"
                    required>

                <label for="disciplina">Disciplina</label>

            </div>

            <div class="form-floating mb-3">

                <textarea
                    class="form-control"
                    id="descricao"
                    placeholder="Descrição"
                    style="height:100px"></textarea>

                <label for="descricao">Descrição</label>

            </div>

            <div class="form-floating mb-3">

                <input
                    type="date"
                    class="form-control"
                    id="dataEntrega"
                    required>

                <label for="dataEntrega">
                    Data de entrega
                </label>

            </div>

            <div class="form-floating mb-4">

                <select
                    class="form-select"
                    id="prioridade"
                    required>

                    <option value="">Selecione</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>

                </select>

                <label for="prioridade">
                    Prioridade
                </label>

            </div>

            <button class="btn btn-success w-100">
                Salvar atividade
            </button>

        </form>

    </div>

</div>

<script>

let editarIndex = localStorage.getItem("editarIndex");

if(editarIndex !== null){

    let atividades =
        JSON.parse(localStorage.getItem("atividades")) || [];

    let atividade = atividades[editarIndex];

    document.getElementById("titulo").value =
        atividade.titulo;

    document.getElementById("disciplina").value =
        atividade.disciplina;

    document.getElementById("descricao").value =
        atividade.descricao;

    document.getElementById("dataEntrega").value =
        atividade.data;

    document.getElementById("prioridade").value =
        atividade.prioridade;

    document.getElementById("tituloTela").innerText =
        "Editar Atividade";

}

function salvarAtividade(event){

    event.preventDefault();

    let atividades =
        JSON.parse(localStorage.getItem("atividades")) || [];

    const atividade = {

        titulo:
            document.getElementById("titulo").value,

        disciplina:
            document.getElementById("disciplina").value,

        descricao:
            document.getElementById("descricao").value,

        data:
            document.getElementById("dataEntrega").value,

        prioridade:
            document.getElementById("prioridade").value

    };

    if(editarIndex !== null){

        atividades[editarIndex] = atividade;

        localStorage.removeItem("editarIndex");

        alert("Atividade atualizada!");

    }else{

        atividades.push(atividade);

        alert("Atividade cadastrada!");

    }

    localStorage.setItem(
        "atividades",
        JSON.stringify(atividades)
    );

    window.location.href = "dashboard.html";

}

</script>

</body>
</html>
