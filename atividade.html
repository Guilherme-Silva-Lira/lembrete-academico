<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Nova Atividade</title>

<style>
.container-box{
    max-width: 600px;
    margin: auto;
}
</style>

</head>

<body class="bg-body-tertiary d-flex align-items-center" style="min-height:100vh;">

<div class="container container-box">

  <div class="card p-4 shadow-lg">

    <!-- TOPO -->
    <div class="d-flex justify-content-between mb-3">
      <h4>Nova Atividade</h4>
      <a href="dashboard.html" class="btn btn-outline-light">⬅ Dashboard</a>
    </div>

    <!-- FORM -->
    <form onsubmit="salvarAtividade(event)">

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="titulo" placeholder="Título" required>
        <label for="titulo">Título</label>
      </div>

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="disciplina" placeholder="Disciplina" required>
        <label for="disciplina">Disciplina</label>
      </div>

      <div class="form-floating mb-3">
        <textarea class="form-control" id="descricao" placeholder="Descrição" style="height:100px"></textarea>
        <label for="descricao">Descrição</label>
      </div>

      <div class="form-floating mb-3">
        <input type="date" class="form-control" id="dataEntrega" required>
        <label for="dataEntrega">Data de entrega</label>
      </div>

      <div class="form-floating mb-4">
        <select class="form-select" id="prioridade" required>
          <option value="">Selecione</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
        <label for="prioridade">Prioridade</label>
      </div>

      <button class="btn btn-success w-100">Salvar atividade</button>

    </form>

  </div>

</div>

<script>
function salvarAtividade(event){
    event.preventDefault();

    let atividades = JSON.parse(localStorage.getItem("atividades")) || [];

    const atividade = {
        titulo: document.getElementById("titulo").value,
        disciplina: document.getElementById("disciplina").value,
        descricao: document.getElementById("descricao").value,
        data: document.getElementById("dataEntrega").value,
        prioridade: document.getElementById("prioridade").value
    };

    atividades.push(atividade);

    localStorage.setItem("atividades", JSON.stringify(atividades));

    alert("Atividade cadastrada com sucesso!");

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
