<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">

<title>Formulário de login</title>
</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary">

<main class="form-container text-center">

  <img src="logo.png2.png" class="logo"> 

  <h5 class="mb-4">Sistema de Lembrete Acadêmico</h5>

  <h1 class="h4 mb-4 fw-normal">Acesse sua conta</h1>

  
  <form onsubmit="login(event)">

    <div class="form-floating mb-2">
      <input type="email" class="form-control" id="email" placeholder="seuemail@gmail.com" required>
      <label for="email">E-mail</label>
    </div>

    <div class="form-floating mb-2">
      <input type="password" class="form-control" id="senha" placeholder="Senha" required>
      <label for="senha">Senha</label>
    </div>

    <div class="form-check text-start my-3">
      <input class="form-check-input" type="checkbox" id="remember">
      <label class="form-check-label" for="remember">
        Lembrar-me
      </label>
    </div>

    <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>

    <p class="mt-3 text-center">
      Não tem uma conta? 
      <a href="cadastro.html" class="text-decoration-none">Cadastre-se</a>
    </p>

    <p class="mt-4 text-secondary">© 2026</p>

  </form>

</main>

<script>
function login(event){
    event.preventDefault();

    alert("Login realizado com sucesso!");

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
